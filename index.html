<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的资料库</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #333;
            margin-bottom: 15px;
        }
        .file-list {
            list-style: none;
            padding: 0;
        }
        .file-list li {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-list li:last-child {
            border-bottom: none;
        }
        .file-link {
            color: #667eea;
            text-decoration: none;
            padding: 6px 16px;
            border: 2px solid #667eea;
            border-radius: 20px;
        }
        .file-link:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 我的资料库</h1>
            <p>个人学习资料整理与分享</p>
        </div>
        
        <!-- 课程资料区 -->
        <div class="card">
            <h2>📖 课程资料</h2>
            <p class="section-desc">课程教材、讲义、参考书</p>
            <ul class="file-list">
                <li>
                    <div class="file-info">
                        <span class="file-name">算法导论教材</span>
                        <span class="file-tag pdf">PDF</span>
                    </div>
                    <a href="algorithms.pdf" class="file-link">下载</a>
                </li>
            </ul>
        </div>
        
        <!-- 视频课程区 -->
        <div class="card">
            <h2>🎬 视频课程</h2>
            <p class="section-desc">在线视频、录播课程</p>
            <ul class="file-list">
                <li>
                    <div class="file-info">
                        <span class="file-name">算法导论 - 第1讲</span>
                        <span class="file-tag video">MP4</span>
                    </div>
                    <a href="#" class="file-link">播放</a>
                </li>
            </ul>
        </div>
        
        <!-- 代码项目区 -->
        <div class="card">
            <h2>💻 代码项目</h2>
            <p class="section-desc">编程练习、项目源码</p>
            <ul class="file-list">
                <li>
                    <div class="file-info">
                        <span class="file-name">排序算法可视化</span>
                        <span class="file-tag code">Python</span>
                    </div>
                    <a href="https://github.com" target="_blank" class="file-link">查看 →</a>
                </li>
            </ul>
        </div>
        
        <!-- 常用工具区 -->
        <div class="card">
            <h2>🔧 常用工具</h2>
            <p class="section-desc">学习工具、在线资源</p>
            <ul class="file-list">
                <li>
                    <div class="file-info">
                        <span class="file-name">LaTeX 公式编辑器</span>
                        <span class="file-tag tool">在线</span>
                    </div>
                    <a href="https://www.latexlive.com/" target="_blank" class="file-link">打开 →</a>
                </li>
                <li>
                    <div class="file-info">
                        <span class="file-name">Draw.io 流程图</span>
                        <span class="file-tag tool">在线</span>
                    </div>
                    <a href="https://app.diagrams.net/" target="_blank" class="file-link">打开 →</a>
                </li>
            </ul>
        </div>
        
        <!-- 学习笔记区 -->
        <div class="card">
            <h2>📝 学习笔记</h2>
            <p class="section-desc">个人整理的知识点、总结</p>
            <ul class="file-list">
                <li>
                    <div class="file-info">
                        <span class="file-name">机器学习入门笔记</span>
                        <span class="file-tag note">MD</span>
                    </div>
                    <a href="#" class="file-link">查看</a>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
